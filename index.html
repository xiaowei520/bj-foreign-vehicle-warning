<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>进京证摄像头情报站</title>
<script src="https://webapi.amap.com/loader.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg-deep: #0a0c10;
    --bg-card: #111318;
    --bg-panel: #161a22;
    --border: #1f2633;
    --border-bright: #2a3345;
    --accent-green: #00ff88;
    --accent-red: #ff3355;
    --accent-yellow: #ffcc00;
    --accent-blue: #4488ff;
    --text-primary: #e8edf5;
    --text-secondary: #7a8899;
    --text-dim: #3d4d60;
    --glow-green: 0 0 12px rgba(0,255,136,0.4);
    --glow-red: 0 0 12px rgba(255,51,85,0.4);
    --glow-yellow: 0 0 12px rgba(255,204,0,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent-green), #00cc66);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    box-shadow: var(--glow-green);
  }

  .logo-text {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-primary);
  }
  .logo-sub {
    font-size: 9px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
  }

  .status-badge {
    display: flex; align-items: center; gap: 5px;
    background: rgba(0,255,136,0.07);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 10px;
    color: var(--accent-green);
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 5px; height: 5px;
    background: var(--accent-green);
    border-radius: 50%;
    box-shadow: var(--glow-green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── Input Row ── */
  .input-section {
    display: flex; flex-direction: column; gap: 6px;
  }

  .input-row {
    display: flex; align-items: center; gap: 6px;
  }

  .input-label {
    width: 14px; height: 14px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700;
    flex-shrink: 0;
  }
  .input-label.start { background: var(--accent-green); color: #000; box-shadow: var(--glow-green); }
  .input-label.end   { background: var(--accent-red);   color: #fff; box-shadow: var(--glow-red); }

  .input-field {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field::placeholder { color: var(--text-dim); }
  .input-field:focus {
    border-color: var(--border-bright);
    box-shadow: 0 0 0 2px rgba(68,136,255,0.12);
  }

  .btn-plan {
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 12px; font-weight: 700;
    padding: 8px 0;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: transform 0.15s, box-shadow 0.15s;
    flex: 1;
  }
  .btn-plan:active { transform: scale(0.96); }
  .btn-plan:disabled { opacity: 0.5; }
  .btn-normal {
    background: linear-gradient(135deg, #334466, #223355);
    border: 1px solid #445588;
    color: #aabbff;
    box-shadow: 0 2px 8px rgba(68,136,255,0.15);
  }
  .btn-avoid {
    background: linear-gradient(135deg, #ff3355, #cc1133);
    box-shadow: 0 2px 12px rgba(255,51,85,0.3);
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex; gap: 6px; margin-top: 8px;
  }

  .stat-chip {
    flex: 1;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    text-align: center;
  }
  .stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600;
  }
  .stat-label { font-size: 9px; color: var(--text-secondary); margin-top: 1px; }
  .stat-val.green { color: var(--accent-green); }
  .stat-val.gray  { color: var(--text-secondary); }
  .stat-val.yellow { color: var(--accent-yellow); }
  .stat-val.red   { color: var(--accent-red); }

  /* ── Map ── */
  #map {
    flex: 1;
    position: relative;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    padding: 12px 20px;
    min-width: 260px; max-width: 320px;
    text-align: center;
    z-index: 9999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .toast-title {
    font-size: 13px; font-weight: 700;
    margin-bottom: 6px;
  }
  .toast-body { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

  .toast-risk   .toast-title { color: var(--accent-yellow); }
  .toast-safe   .toast-title { color: var(--accent-green); }
  .toast-info   .toast-title { color: var(--accent-blue); }
  .toast-error  .toast-title { color: var(--accent-red); }

  /* ── Legend ── */
  .legend {
    position: absolute;
    bottom: 16px; right: 10px;
    background: rgba(10,12,16,0.45);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 8px 10px;
    z-index: 200;
    backdrop-filter: blur(10px);
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .legend:hover { opacity: 1; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .legend-item:last-child { margin-bottom: 0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Loading overlay ── */
  #loading {
    position: absolute; inset: 0;
    background: rgba(10,12,16,0.75);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500;
    gap: 12px;
    backdrop-filter: blur(2px);
    transition: opacity 0.3s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.05em; }

  /* ── 新增摄像头悬浮按钮 ── */
  #add-camera-btn {
    position: absolute;
    bottom: 100px; right: 14px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,51,85,0.65);
    border: 1px solid rgba(255,51,85,0.3);
    color: #fff;
    font-size: 22px; line-height: 1;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(255,51,85,0.25);
    z-index: 300;
    transition: transform 0.15s, background 0.2s, opacity 0.2s;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    opacity: 0.75;
  }
  #add-camera-btn:hover { opacity: 1; background: rgba(255,51,85,0.9); }
  #add-camera-btn:active { transform: scale(0.92); }
  #add-camera-btn.picking {
    background: rgba(255,204,0,0.7);
    border-color: rgba(255,204,0,0.4);
    box-shadow: 0 2px 12px rgba(255,204,0,0.3);
    opacity: 1;
    animation: btn-pulse 1.2s infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* Amap overrides */
  .amap-logo, .amap-copyright { opacity: 0.4 !important; }

  /* ── Camera Detail Panel ── */
  #detail-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border-bright);
    border-radius: 16px 16px 0 0;
    padding: 16px;
    z-index: 400;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
    max-height: 70vh; overflow-y: auto;
  }
  #detail-panel.show { transform: translateY(0); }
  .detail-handle { width:36px;height:3px;background:var(--border-bright);border-radius:2px;margin:0 auto 14px; }
  .detail-header { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px; }
  .detail-addr { font-size:14px;font-weight:700;flex:1; }
  .detail-close { background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;padding:0 0 0 10px; }
  .detail-meta { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px; }
  .meta-chip { background:var(--bg-panel);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:10px;color:var(--text-secondary); }
  .conf-bar { height:4px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden; }
  .conf-fill { height:100%;border-radius:2px;transition:width 0.3s; }
  .reports-title { font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:8px;letter-spacing:0.05em; }
  .report-item { background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start; }
  .report-thumb { width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer;border:1px solid var(--border); }
  .report-thumb.blurred {
    filter: blur(6px);
    cursor: default;
    pointer-events: none;
    position: relative;
  }
  .report-thumb-wrap {
    position: relative; width:48px; height:48px; flex-shrink:0;
  }
  .report-thumb-wrap .blur-badge {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.35);
    border-radius:6px;
    font-size:9px; color:rgba(255,255,255,0.7);
    pointer-events:none;
    text-align:center; line-height:1.3;
  }
  .report-info { flex:1;min-width:0; }
  .report-time { font-size:10px;color:var(--text-secondary);margin-bottom:3px; }
  .report-desc { font-size:11px;color:var(--text-primary); }
  .report-badge { font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;display:inline-block; }
  .badge-approved { background:rgba(0,255,136,0.12);color:var(--accent-green); }
  .badge-pending  { background:rgba(255,204,0,0.12);color:var(--accent-yellow); }
  .btn-report { width:100%;background:linear-gradient(135deg,#334466,#223355);border:1px solid #445588;border-radius:8px;color:#aabbff;font-size:12px;font-weight:700;padding:10px;cursor:pointer;margin-top:10px;font-family:'Noto Sans SC',sans-serif; }

  /* ── Report Modal ── */
  #report-modal { position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center;z-index:9000; }
  #report-modal.show { display:flex; }
  .report-sheet { background:var(--bg-card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px; }
  .report-sheet h3 { font-size:14px;font-weight:700;margin-bottom:4px; }
  .report-sheet p  { font-size:11px;color:var(--text-secondary);margin-bottom:16px; }
  .upload-area { border:2px dashed var(--border-bright);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px; }
  .upload-preview { width:100%;max-height:160px;object-fit:cover;border-radius:8px;display:none; }
  .upload-icon { font-size:28px;margin-bottom:6px; }
  .upload-text { font-size:11px;color:var(--text-secondary); }
  .report-input { width:100%;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text-primary);font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;margin-bottom:10px;resize:none; }
  .report-btns { display:flex;gap:8px; }
  .report-btns button { flex:1;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif; }
  .report-submit { background:linear-gradient(135deg,#00cc66,#009944);color:#000; }
  .report-cancel { background:var(--bg-panel);color:var(--text-secondary);border:1px solid var(--border); }

  /* ── Comment styles ── */
  .comment-input-wrap { background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:10px; }
  .comment-type-row { display:flex;gap:6px; }
  .type-btn {
    flex:1;padding:5px 6px;background:var(--bg-panel);
    border:1px solid var(--border);border-radius:6px;
    color:var(--text-secondary);font-size:11px;cursor:pointer;
    font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;
  }
  .type-btn.active { background:rgba(68,136,255,0.15);border-color:#4488ff;color:#4488ff; }

  .comment-item { padding:10px 0;border-bottom:1px solid var(--border); }
  .comment-item:last-child { border-bottom:none; }
  .comment-header { display:flex;align-items:center;gap:6px;margin-bottom:4px; }
  .comment-nick { font-size:12px;font-weight:600; }
  .comment-time { font-size:10px;color:var(--text-secondary); }
  .comment-weight { font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto; }
  .weight-high   { background:rgba(0,255,136,0.1);color:var(--accent-green); }
  .weight-mid    { background:rgba(255,204,0,0.1);color:var(--accent-yellow); }
  .weight-low    { background:rgba(100,100,100,0.15);color:var(--text-secondary); }
  .comment-body { font-size:12px;color:var(--text-primary);line-height:1.5; }
  .comment-type-tag {
    font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;display:inline-block;margin-bottom:4px;
  }
  .tag-confirm { background:rgba(0,255,136,0.12);color:var(--accent-green); }
  .tag-deny    { background:rgba(255,51,85,0.12);color:var(--accent-red); }
  .tag-info    { background:rgba(68,136,255,0.12);color:var(--accent-blue); }
  .comment-faded { opacity:0.45; }

  .weight-bar-wrap { height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden; }
  .weight-bar-fill { height:100%;border-radius:1px;transition:width 0.3s; }

  /* search result items */
  .search-result-item {
    padding:7px 10px;background:var(--bg-panel);border:1px solid var(--border);
    border-radius:6px;margin-bottom:4px;font-size:11px;cursor:pointer;
    color:var(--text-primary);
  }
  .search-result-item:hover { border-color:#4488ff;color:#4488ff; }
  #detail-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border-bright);
    border-radius: 16px 16px 0 0;
    padding: 16px;
    z-index: 400;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.1,0.64,1);
    max-height: 70vh; overflow-y: auto;
  }
  #detail-panel.show { transform: translateY(0); }
  .detail-handle {
    width: 36px; height: 3px; background: var(--border-bright);
    border-radius: 2px; margin: 0 auto 14px;
  }
  .detail-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
  .detail-addr { font-size:14px; font-weight:700; flex:1; }
  .detail-close { background:none; border:none; color:var(--text-secondary); font-size:18px; cursor:pointer; padding:0 0 0 10px; }
  .detail-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .meta-chip {
    background: var(--bg-panel); border:1px solid var(--border);
    border-radius:20px; padding:3px 9px; font-size:10px; color:var(--text-secondary);
  }
  .conf-bar { height:4px; background:var(--border); border-radius:2px; margin-bottom:14px; overflow:hidden; }
  .conf-fill { height:100%; border-radius:2px; }

  /* Reports list */
  .reports-title { font-size:11px; color:var(--text-secondary); font-weight:600; margin-bottom:8px; letter-spacing:0.05em; }
  .report-item {
    background:var(--bg-panel); border:1px solid var(--border);
    border-radius:8px; padding:10px; margin-bottom:6px;
    display:flex; gap:10px; align-items:flex-start;
  }
  .report-thumb {
    width:48px; height:48px; border-radius:6px; object-fit:cover;
    flex-shrink:0; cursor:pointer; border:1px solid var(--border);
  }
  .report-info { flex:1; min-width:0; }
  .report-time { font-size:10px; color:var(--text-secondary); margin-bottom:3px; }
  .report-desc { font-size:11px; color:var(--text-primary); }
  .report-badge {
    font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;
    margin-top:4px; display:inline-block;
  }
  .badge-approved { background:rgba(0,255,136,0.12); color:var(--accent-green); }
  .badge-pending  { background:rgba(255,204,0,0.12);  color:var(--accent-yellow); }

  .btn-report {
    width:100%; background:linear-gradient(135deg,#334466,#223355);
    border:1px solid #445588; border-radius:8px;
    color:#aabbff; font-size:12px; font-weight:700;
    padding:10px; cursor:pointer; margin-top:10px;
    font-family:'Noto Sans SC',sans-serif;
  }
  .btn-report:active { opacity:0.8; }

  /* ── Report Upload Modal ── */
  #report-modal {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:none; align-items:flex-end; justify-content:center;
    z-index:9000;
  }
  #report-modal.show { display:flex; }
  .report-sheet {
    background:var(--bg-card); border-radius:16px 16px 0 0;
    padding:20px; width:100%; max-width:480px;
  }
  .report-sheet h3 { font-size:14px; font-weight:700; margin-bottom:4px; }
  .report-sheet p  { font-size:11px; color:var(--text-secondary); margin-bottom:16px; }
  .upload-area {
    border:2px dashed var(--border-bright); border-radius:10px;
    padding:20px; text-align:center; cursor:pointer;
    margin-bottom:12px; transition:border-color 0.2s;
  }
  .upload-area:hover { border-color:var(--accent-blue); }
  .upload-area input { display:none; }
  .upload-preview { width:100%; max-height:160px; object-fit:cover; border-radius:8px; display:none; }
  .upload-icon { font-size:28px; margin-bottom:6px; }
  .upload-text { font-size:11px; color:var(--text-secondary); }
  .report-input {
    width:100%; background:var(--bg-panel); border:1px solid var(--border);
    border-radius:8px; padding:10px; color:var(--text-primary);
    font-size:12px; font-family:'Noto Sans SC',sans-serif;
    outline:none; margin-bottom:10px; resize:none;
  }
  .report-btns { display:flex; gap:8px; }
  .report-btns button {
    flex:1; padding:10px; border:none; border-radius:8px;
    font-size:12px; font-weight:700; cursor:pointer;
    font-family:'Noto Sans SC',sans-serif;
  }
  .report-submit { background:linear-gradient(135deg,#00cc66,#009944); color:#000; }
  .report-cancel { background:var(--bg-panel); color:var(--text-secondary); border:1px solid var(--border); }

  /* ── Export Button ── */
  #export-btn {
    position: absolute;
    bottom: 90px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,180,80,0.65);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 24px;
    color: #fff;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 10px 24px;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,180,80,0.2);
    z-index: 300;
    letter-spacing: 0.05em;
    transition: transform 0.15s, background 0.2s;
    white-space: nowrap;

async function fetchCameras() {
  if (BACKEND_URL !== 'https://YOUR_APP.railway.app') {
    try {
      const res = await fetch(`${BACKEND_URL}/api/cameras`);
      if (res.ok) {
        const data = await res.json();
        if (data.length) return data;
      }
    } catch(e) { console.warn('后端拉取失败，使用 Mock 数据', e); }
  }
  console.warn('[情报站] 使用 Mock 数据');
  return MOCK_CAMERAS;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function initApp(key) {
  showLoading('正在加载地图…');
  try {
    const AMap = await new Promise((resolve, reject) => {
      window.AMapLoader.load({
        key,
        version: '2.0',
        plugins: [],
      }).then(resolve).catch(reject);
    });
    window.AMap = AMap;
    initMap();
    const data = await fetchCameras();
    cameras = data;
    renderCameraMarkers();
    updateStats();
    hideLoading();
    document.getElementById('status-text').textContent = `${cameras.length} 点位`;
  } catch(e) {
    hideLoading();
    showToast('error', 'Key 无效或网络错误', '请检查高德 API Key 是否正确，或刷新重试');
    console.error(e);
  }
}

function initMap() {

    viewMode: '2D',

    center: [116.4074, 39.9042],
    mapStyle: 'amap://styles/dark',

// ─── Camera Markers ───────────────────────────────────────────────────────────

  cameraMarkers.forEach(m => m.setMap(null));
  cameraMarkers = [];

  cameras.forEach(cam => {
    const isActive = cam.status === 'active';

    const size  = isActive ? 7 : 5;
    const content = `
      <div style="
        width:${size*2}px; height:${size*2}px;
        border-radius:50%;
        background:${color};
        border: 1.5px solid ${isActive ? 'rgba(0,255,136,0.5)' : 'rgba(68,85,102,0.3)'};
        box-shadow: ${isActive ? `0 0 6px ${color}` : 'none'};
        cursor:pointer;
      "></div>
    `;
    const marker = new AMap.Marker({
      position: [cam.lng, cam.lat],
      content,
      offset: new AMap.Pixel(-size, -size),
      zIndex: isActive ? 12 : 10,
      extData: cam,
    });
    marker.on('click', () => showCameraDetail(cam));
    marker.setMap(map);
    cameraMarkers.push(marker);
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function updateStats(riskCount = '—', avoidCount = '—') {
  const active   = cameras.filter(c => c.status === 'active').length;
  const inactive = cameras.filter(c => c.status !== 'active').length;
  document.getElementById('stat-active').textContent   = active;
  document.getElementById('stat-inactive').textContent = inactive;
  document.getElementById('stat-risk').textContent     = riskCount;
  document.getElementById('stat-avoid').textContent    = avoidCount;
}

// ─── Geocode helper (REST API) ────────────────────────────────────────────────
async function geocodeAddress(address) {
  const url = `https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(address)}&city=北京&key=${AMAP_REST_KEY}&output=json`;
  console.log('[地理编码] 请求:', url);
  const res = await fetch(url);
  const data = await res.json();
  console.log('[地理编码] 响应:', data);
  if (data.status !== '1' || !data.geocodes || !data.geocodes.length) {
    throw new Error(`无法解析地址：${address}，错误：${data.info}`);
  }
  const [lng, lat] = data.geocodes[0].location.split(',').map(Number);
  return [lng, lat];
}

// ─── Route Planning ───────────────────────────────────────────────────────────
async function startPlanning(mode = 'normal') {
  const originText = document.getElementById('origin-input').value.trim();
  const destText   = document.getElementById('dest-input').value.trim();
  if (!originText || !destText) {
    showToast('error', '请填写起终点', '起点和终点不能为空');
    return;
  }

  const planBtn  = document.getElementById('plan-btn');
  const avoidBtn = document.getElementById('avoid-btn');
  planBtn.disabled = true;
  avoidBtn.disabled = true;
  showLoading(mode === 'avoid' ? '正在智能避让规划…' : '正在规划路线…');
  clearRoutes();

  try {
    const [originLnglat, destLnglat] = await Promise.all([
      geocodeAddress(originText),
      geocodeAddress(destText),
    ]);

    // 存起终点供导出用
    lastOrigin = { lnglat: originLnglat, name: originText };
    lastDest   = { lnglat: destLnglat,   name: destText };
    document.getElementById('export-btn').style.display = 'none';

    const activeCams = cameras.filter(c => c.status === 'active');

    if (mode === 'normal') {
      // ── 普通规划 ──────────────────────────────────────────────────
      const route = await planRoute(originLnglat, destLnglat, 0);
      const path  = extractPath(route.paths[0]);
      const riskCams = activeCams.filter(cam => isNearPath(path, [cam.lng, cam.lat], 150));

      drawSegmentedRoute(path, riskCams);          // 灰底 + 红色风险段
      drawEndpointMarkers(originLnglat, destLnglat, originText, destText);
      highlightRiskCameras(riskCams);
      updateStats(riskCams.length, '—');
      hideLoading();

      if (riskCams.length === 0) {
        showToast('safe', '✅ 路线安全', '当前路线未发现风险摄像头');
      } else {
        showToast('risk', `⚠️ ${riskCams.length} 个风险点`, '红色路段途经摄像头，可使用「智能避让」重新规划');
      }

    } else {
      // ── 智能避让：先规划普通路线，检测风险，再带 avoidpolygons 重规划 ──
      const origRoute = await planRoute(originLnglat, destLnglat, 0);
      const origPath  = extractPath(origRoute.paths[0]);
      const origSteps = origRoute.paths[0].steps || [];
      const riskCams  = activeCams.filter(cam => isNearPath(origPath, [cam.lng, cam.lat], 150));

      // ① 原始路线：灰色加粗 + 红色风险段叠加
      drawSegmentedRoute(origPath, riskCams);
      drawEndpointMarkers(originLnglat, destLnglat, originText, destText);
      highlightRiskCameras(riskCams);

      let avoidPath = null;
      let avoidedCount = 0;
      let riskRoadNames = [];

      if (riskCams.length > 0) {
        // 提取风险路段道路名
        riskRoadNames = extractRiskRoadNames(origPath, origSteps, riskCams);
        avoidPath = await planRouteWithAvoid(originLnglat, destLnglat, riskCams);
        if (avoidPath) {
          const afterRisk = activeCams.filter(cam => isNearPath(avoidPath, [cam.lng, cam.lat], 150)).length;
          avoidedCount = Math.max(0, riskCams.length - afterRisk);
          // ② 避让路线：绿色实线（zIndex 更高覆盖在上）
          drawPolyline(avoidPath, '#00ff88', 5, 0.92);
          // ③ 标注分叉对比点
          drawDiffMarkers(origPath, avoidPath);
        }
      } else {
        drawPolyline(origPath, '#00ff88', 5, 0.9);
      }

      lastRiskRoadNames = riskRoadNames;
      updateStats(riskCams.length, avoidedCount);
      hideLoading();
      document.getElementById('export-btn').style.display = 'block';

      if (riskCams.length === 0) {
        showToast('safe', '✅ 路线安全', '沿途无风险摄像头，绿色路线可直接出行');
      } else if (avoidPath) {
        showToast('safe', `🛡 已避开 ${avoidedCount} 个摄像头`,
          `灰红色=原路线  绿色=避让路线\n◆ 标注点为路线差异处`);
      } else {
        showToast('risk', `⚠️ 无法完全避让`, `共 ${riskCams.length} 个风险点`);
      }
    }

    map.setFitView(null, false, [60, 80, 60, 80]);

  } catch (err) {
    hideLoading();
    showToast('error', '规划失败', err.message);
    console.error(err);
  }

  planBtn.disabled = false;
  avoidBtn.disabled = false;
}

// ─── Route helpers ────────────────────────────────────────────────────────────
// ─── Route helpers (REST API) ─────────────────────────────────────────────────
async function planRoute(origin, dest, strategy = 0) {
  const url = `https://restapi.amap.com/v3/direction/driving?origin=${origin[0]},${origin[1]}&destination=${dest[0]},${dest[1]}&strategy=${strategy}&extensions=all&key=${AMAP_REST_KEY}&output=json`;
  console.log('[路线规划] 请求:', url);
  const res = await fetch(url);
  const data = await res.json();
  console.log('[路线规划] 响应:', data);
  if (data.status !== '1' || !data.route || !data.route.paths || !data.route.paths.length) {
    throw new Error(`路线规划失败：${data.info || '未知错误'}`);
  }
  return data.route;
}

// ─── 真正的避让规划：把风险摄像头转成 avoidpolygons 传给高德 ─────────────────
async function planRouteWithAvoid(origin, dest, riskCams) {
  // 每个摄像头生成一个约 150m 的方形避让区（经纬度偏移约 0.0014°）
  const D = 0.0014;
  const polygons = riskCams.map(cam => {
    const { lng, lat } = cam;
    return [
      `${(lng-D).toFixed(6)},${(lat-D).toFixed(6)}`,
      `${(lng+D).toFixed(6)},${(lat-D).toFixed(6)}`,
      `${(lng+D).toFixed(6)},${(lat+D).toFixed(6)}`,
      `${(lng-D).toFixed(6)},${(lat+D).toFixed(6)}`,
    ].join(';');
  });

  // 高德限制 avoidpolygons 最多 16 个，取风险最高的前 16
  const avoidpolygons = polygons.slice(0, 16).join('|');
  const url = `https://restapi.amap.com/v3/direction/driving?origin=${origin[0]},${origin[1]}&destination=${dest[0]},${dest[1]}&strategy=0&extensions=all&avoidpolygons=${encodeURIComponent(avoidpolygons)}&key=${AMAP_REST_KEY}&output=json`;
  console.log('[避让规划] 请求:', url);
  const res  = await fetch(url);
  const data = await res.json();
  console.log('[避让规划] 响应:', data);
  if (data.status !== '1' || !data.route?.paths?.length) return null;
  return extractPath(data.route.paths[0]);
}

function extractPath(pathObj) {
  // REST API 返回: steps[].polyline = "lng,lat;lng,lat;..."
  const pts = [];
  (pathObj.steps || []).forEach(step => {
    const polyline = step.polyline || '';
    polyline.split(';').forEach(pair => {
      const [lng, lat] = pair.split(',').map(Number);
      if (!isNaN(lng) && !isNaN(lat)) pts.push([lng, lat]);
    });
  });
  return pts;
}

// ─── 起终点大图标 ──────────────────────────────────────────────────────────────
function drawEndpointMarkers(originLnglat, destLnglat, originText, destText) {
  const makeIcon = (label, color, textColor) => `

    ">

        max-width:120px; overflow:hidden; text-overflow:ellipsis;
      ">${label}</div>
      <div style="
        width:0; height:0;
        border-left:6px solid transparent;
        border-right:6px solid transparent;

        margin-top:-1px;
      "></div>

// ─── 分段绘制路线（先画完整底线，再叠加红色风险段） ──────────────────────────
function drawSegmentedRoute(path, riskCams) {
  if (!path.length) return;

  // 1. 先画完整路线（加粗灰色底线，清晰可见）
  drawPolyline(path, '#ccddee', 5, 0.85);

  // 2. 如果没有风险点就结束
  if (!riskCams.length) return;

  // 3. 标记每个点是否在风险区
  const isRisk = path.map(pt =>
    riskCams.some(cam => haversine(pt, [cam.lng, cam.lat]) < 200)
  );

  // 4. 提取连续风险段，叠加红色粗线
  let seg = null;
  for (let i = 0; i < path.length; i++) {
    if (isRisk[i]) {
      if (!seg) seg = i > 0 ? [path[i-1], path[i]] : [path[i]];
      else seg.push(path[i]);
    } else {
      if (seg) {
        seg.push(path[i]);
        drawPolyline(seg, '#ff3355', 6, 0.95);
        seg = null;
      }
    }
  }
  if (seg) drawPolyline(seg, '#ff3355', 6, 0.95);
}

// ─── 风险摄像头圆圈 + 地图内 tips ────────────────────────────────────────────
function highlightRiskCameras(cams) {
  riskCircles.forEach(c => c.setMap(null));
  riskCircles = [];

  cams.forEach((cam, i) => {
    // 黄色警戒圆
    const circle = new AMap.Circle({
      center: [cam.lng, cam.lat],
      radius: 150,
      strokeColor: '#ffcc00',
      strokeWeight: 2,
      strokeOpacity: 0.9,
      fillColor: '#ffcc00',
      fillOpacity: 0.15,
      zIndex: 15,
    });
    circle.setMap(map);
    riskCircles.push(circle);

    // 地图内悬浮 tip 标签
    const tip = new AMap.Marker({
      position: [cam.lng, cam.lat],
      content: `
        <div style="
          background:rgba(255,51,51,0.92);
          color:#fff;
          font-family:'Noto Sans SC',sans-serif;
          font-size:10px; font-weight:600;
          padding:3px 7px;
          border-radius:4px;
          white-space:nowrap;
          box-shadow:0 2px 8px rgba(0,0,0,0.4);
          transform:translateX(-50%) translateY(-130%);
          pointer-events:none;
        ">⚠️ 风险点 ${i + 1}</div>
      `,
      offset: new AMap.Pixel(0, 0),
      zIndex: 180,
    });
    tip.setMap(map);
    riskCircles.push(tip);
  });
}

function drawPolyline(path, color, weight, opacity, dashArray) {
  const poly = new AMap.Polyline({
    path: path.map(p => new AMap.LngLat(p[0], p[1])),
    strokeColor: color,
    strokeWeight: weight,
    strokeOpacity: opacity,
    strokeDasharray: dashArray || null,
    lineJoin: 'round',
    lineCap: 'round',
    zIndex: 20,
  });
  poly.setMap(map);
  routePolylines.push(poly);
}

// ─── 提取风险路段道路名 ───────────────────────────────────────────────────────
function extractRiskRoadNames(path, steps, riskCams) {
  const names = new Set();
  steps.forEach(step => {
    const road = step.road || step.instruction || '';
    if (!road) return;
    // 解析该 step 的路径点
    const pts = [];
    (step.polyline || '').split(';').forEach(pair => {
      const [lng, lat] = pair.split(',').map(Number);
      if (!isNaN(lng)) pts.push([lng, lat]);
    });
    // 如果该 step 任意点靠近风险摄像头，记录路名
    const isRisk = pts.some(pt =>
      riskCams.some(cam => haversine(pt, [cam.lng, cam.lat]) < 200)
    );
    if (isRisk) names.add(road);
  });
  return [...names].slice(0, 8); // 最多显示8条
}

// ─── 标注两条路线分叉对比点 ──────────────────────────────────────────────────
function drawDiffMarkers(origPath, avoidPath) {
  if (!origPath.length || !avoidPath.length) return;

  // 找出避让路线上距离原路线最远的点（差异最大处）
  let maxDist = 0, maxPt = null;
  avoidPath.forEach(pt => {
    const minDist = Math.min(...origPath.map(op => haversine(pt, op)));
    if (minDist > maxDist) { maxDist = minDist; maxPt = pt; }
  });

  if (!maxPt || maxDist < 100) return; // 差异太小不标注

  // 在分叉最大处画橙色钻石标注
  const marker = new AMap.Marker({
    position: maxPt,
    content: `
      <div style="
        background:#ff9900;
        color:#000;
        font-family:'Noto Sans SC',sans-serif;
        font-size:10px; font-weight:700;
        padding:3px 8px;
        border-radius:4px;
        white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
        transform:translateX(-50%) translateY(-130%);
        border: 1px solid rgba(255,200,0,0.6);
      ">◆ 绕行点 +${Math.round(maxDist)}m</div>
    `,
    offset: new AMap.Pixel(0, 0),
    zIndex: 190,
  });
  marker.setMap(map);
  riskCircles.push(marker);

  // 同时在原路线对应位置标注"原路线经过此处"
  let minDist2 = Infinity, closestOrig = null;
  origPath.forEach(pt => {
    const d = haversine(pt, maxPt);
    if (d < minDist2) { minDist2 = d; closestOrig = pt; }
  });
  if (closestOrig) {
    const marker2 = new AMap.Marker({
      position: closestOrig,
      content: `
        <div style="
          background:#ff3355;
          color:#fff;
          font-family:'Noto Sans SC',sans-serif;
          font-size:10px; font-weight:700;
          padding:3px 8px;
          border-radius:4px;
          white-space:nowrap;
          box-shadow:0 2px 8px rgba(0,0,0,0.5);
          transform:translateX(-50%) translateY(-130%);
        ">✕ 原路线风险段</div>
      `,
      offset: new AMap.Pixel(0, 0),
      zIndex: 190,
    });
    marker2.setMap(map);
    riskCircles.push(marker2);
  }
}

// ─── Supabase helpers ─────────────────────────────────────────────────────────
async function sbAnon(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {}),
    },
  });

  return text ? JSON.parse(text) : [];
}

function getNickname() {
  return localStorage.getItem('cam_nickname') || '';
}
function saveNickname(nick) {
  if (nick) localStorage.setItem('cam_nickname', nick);
}

// ─── 评论衰变权重 ─────────────────────────────────────────────────────────────
// 半衰期 90 天（评论比摄像头衰减更快）
function commentWeight(createdAt) {
  const days = (Date.now() - new Date(createdAt)) / 86400000;
  return Math.max(0, Math.pow(0.5, days / 90));
}

// ─── 摄像头详情面板 ───────────────────────────────────────────────────────────
let currentCamera = null;
let currentCommentType = 'confirm';

async function showCameraDetail(cam) {
  currentCamera = cam;
  const conf = cam.confidence ?? 100;
  const confColor = conf > 60 ? 'var(--accent-green)' : conf > 30 ? 'var(--accent-yellow)' : 'var(--accent-red)';
  const daysSince = cam.last_report_at
    ? Math.floor((Date.now() - new Date(cam.last_report_at)) / 86400000) : null;

  document.getElementById('detail-addr').textContent =
    cam.address || `${cam.lng?.toFixed(4)}, ${cam.lat?.toFixed(4)}`;
  document.getElementById('detail-meta').innerHTML = `
    <div class="meta-chip">${cam.status === 'active' ? '✅ 有效' : cam.status === 'pending' ? '⏳ 待审核' : '⚠️ 已失效'}</div>
    <div class="meta-chip">👥 ${cam.report_count ?? 1} 人上报</div>
    ${daysSince !== null ? `<div class="meta-chip">🕐 ${daysSince} 天前更新</div>` : ''}
    <div class="meta-chip">准确度 ${conf}%</div>
  `;
  document.getElementById('detail-conf-fill').style.cssText = `width:${conf}%;background:${confColor}`;
  document.getElementById('detail-conf-text').textContent =
    conf >= 70 ? '✅ 数据较新，可信度高' :
    conf >= 40 ? '⚠️ 数据有一定时间，建议谨慎参考' : '🔴 数据较旧，准确度低';

  // 恢复昵称
  document.getElementById('comment-nickname').value = getNickname();

  document.getElementById('detail-panel').classList.add('show');
  document.getElementById('report-modal-addr').textContent =
    `位置：${cam.address || '未知地址'}`;

  await Promise.all([loadComments(cam), loadReports(cam)]);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('show');
  currentCamera = null;
}

// ─── 加载评论 ─────────────────────────────────────────────────────────────────
async function loadComments(cam) {
  const el = document.getElementById('detail-comments');
  el.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:6px 0">加载中…</div>';

  try {
    if (!cam.id || BACKEND_URL === 'https://YOUR_APP.railway.app') {
      el.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:6px 0">连接后端后可查看讨论</div>';
      return;
    }
    const res = await fetch(`${BACKEND_URL}/api/cameras/${cam.id}/comments`);
    const comments = res.ok ? await res.json() : [];

    if (!comments.length) {
      el.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:6px 0">暂无讨论，来说第一句话</div>';
      return;
    }

    // 按时间倒序，计算权重
    const withWeight = comments.map(c => ({
      ...c, w: commentWeight(c.created_at)
    })).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

    el.innerHTML = withWeight.map(c => {
      const w = c.w;
      const wLabel = w > 0.6 ? '高可信' : w > 0.25 ? '中可信' : '旧数据';
      const wClass = w > 0.6 ? 'weight-high' : w > 0.25 ? 'weight-mid' : 'weight-low';
      const faded  = w < 0.25 ? 'comment-faded' : '';
      const typeTag = { confirm:'✅ 确认有效', deny:'❌ 已失效', info:'💬 补充' }[c.comment_type] || '';
      const typeClass = { confirm:'tag-confirm', deny:'tag-deny', info:'tag-info' }[c.comment_type] || 'tag-info';
      const t = new Date(c.created_at).toLocaleDateString('zh-CN');
      const barColor = w > 0.6 ? '#00ff88' : w > 0.25 ? '#ffcc00' : '#445566';

      return `
        <div class="comment-item ${faded}">
          <div class="comment-header">
            <span class="comment-nick">${c.nickname || '匿名'}</span>
            <span class="comment-time">${t}</span>
            <span class="comment-weight ${wClass}">${wLabel}</span>
          </div>
          <div class="comment-type-tag ${typeClass}">${typeTag}</div>
          <div class="comment-body">${c.content}</div>
          <div class="weight-bar-wrap">
            <div class="weight-bar-fill" style="width:${Math.round(w*100)}%;background:${barColor}"></div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div style="font-size:11px;color:var(--accent-red);padding:6px 0">加载失败</div>`;
  }
}

// ─── 加载上报记录 ─────────────────────────────────────────────────────────────
async function loadReports(cam) {
  const reportsEl = document.getElementById('detail-reports');
  reportsEl.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:8px 0">加载中…</div>';
  try {
    if (cam.id && BACKEND_URL !== 'https://YOUR_APP.railway.app') {
      const res = await fetch(`${BACKEND_URL}/api/cameras/${cam.id}/reports`);
      const reports = res.ok ? await res.json() : [];
      if (!reports.length) {
        reportsEl.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:8px 0">暂无上报记录</div>';
      } else {
        reportsEl.innerHTML = reports.map(r => {
          const t = new Date(r.reported_at).toLocaleDateString('zh-CN');
          const isPending = r.status !== 'approved';
          const thumbHtml = r.screenshot_url ? `
            <div class="report-thumb-wrap">
              <img class="report-thumb ${isPending ? 'blurred' : ''}"
                src="${r.screenshot_url}"
                ${!isPending ? `onclick="openImgModal('${r.screenshot_url}')"` : ''} />
              ${isPending ? `<div class="blur-badge">审核中<br>已打码</div>` : ''}
            </div>
          ` : `<div style="width:48px;height:48px;background:var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">📷</div>`;
          return `
            <div class="report-item">
              ${thumbHtml}
              <div class="report-info">
                <div class="report-time">🕐 ${t} ${r.plate_province ? `· 🚗 ${r.plate_province}` : ''}</div>
                <div class="report-desc">${r.description || '无补充说明'}</div>
                <div class="report-badge ${r.status === 'approved' ? 'badge-approved' : 'badge-pending'}">
                  ${r.status === 'approved' ? '✅ 已验证' : '⏳ 待审核'}
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
    } else {
      reportsEl.innerHTML = '<div style="font-size:11px;color:var(--text-secondary);padding:8px 0">连接后端后可查看上报记录</div>';
    }
  } catch(e) {
    reportsEl.innerHTML = `<div style="font-size:11px;color:var(--accent-red);padding:8px 0">加载失败</div>`;
  }
}

// ─── 发表评论 ─────────────────────────────────────────────────────────────────
function selectCommentType(btn) {
  document.querySelectorAll('#comment-type-row .type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCommentType = btn.dataset.type;
}

async function submitComment() {
  if (!currentCamera) return;
  const nickname = document.getElementById('comment-nickname').value.trim() || '匿名';
  const content  = document.getElementById('comment-content').value.trim();
  if (!content) { showToast('error', '请输入内容', '评论不能为空'); return; }

  saveNickname(nickname);

  try {
    if (BACKEND_URL === 'https://YOUR_APP.railway.app') throw new Error('请先配置后端');
    const res = await fetch(`${BACKEND_URL}/api/cameras/${currentCamera.id}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, content, comment_type: currentCommentType }),
    });
    if (!res.ok) throw new Error('发送失败');
    document.getElementById('comment-content').value = '';
    await loadComments(currentCamera);
    showToast('safe', '✅ 已发送', '');
  } catch(e) {
    showToast('error', '发送失败', e.message);
  }
}

// ─── 新增摄像头入口（悬浮按钮） ──────────────────────────────────────────────
function startNewCameraReport() {
  const btn = document.getElementById('add-camera-btn');
  if (pickMode) {
    // 再次点击取消选点
    cancelPick();
    btn.classList.remove('picking');
    btn.textContent = '＋';
    return;
  }
  // 关闭详情面板，进入选点模式
  closeDetail();
  btn.classList.add('picking');
  btn.textContent = '✕';
  currentCamera = null;
  enterPickMode();
}

// ─── 地图选点 ─────────────────────────────────────────────────────────────────
let pickMode = false;
let pickMarker = null;
let pickedLocation = null; // { lng, lat, address }

function enterPickMode() {
  pickMode = true;
  closeReportModal();
  document.getElementById('pick-tip').style.display = 'block';
  map.setDefaultCursor('crosshair');

  // 长按 / click 选点
  map.on('click', onMapPick);
}

function onMapPick(e) {
  if (!pickMode) return;
  const lng = e.lnglat.getLng();
  const lat = e.lnglat.getLat();
  pickedLocation = { lng, lat, address: '' };

  // 放置临时标记
  if (pickMarker) pickMarker.setMap(null);
  pickMarker = new AMap.Marker({
    position: [lng, lat],
    content: `<div style="width:20px;height:20px;border-radius:50%;background:#00ff88;border:3px solid #fff;box-shadow:0 0 10px #00ff88;transform:translate(-50%,-50%)"></div>`,
    offset: new AMap.Pixel(0, 0),
    zIndex: 999,
  });
  pickMarker.setMap(map);

  // 逆地理编码获取地址
  document.getElementById('pick-addr-text').textContent = '📍 解析地址中…';
  document.getElementById('pick-confirm').style.display = 'block';

  const gcUrl = `https://restapi.amap.com/v3/geocode/regeo?location=${lng},${lat}&key=${AMAP_REST_KEY}&radius=50&output=json`;
  fetch(gcUrl).then(r => r.json()).then(data => {
    const addr = data.regeocode?.formatted_address || `${lng.toFixed(5)}, ${lat.toFixed(5)}`;
    pickedLocation.address = addr;
    document.getElementById('pick-addr-text').textContent = `📍 ${addr}`;
  }).catch(() => {
    document.getElementById('pick-addr-text').textContent = `📍 ${lng.toFixed(5)}, ${lat.toFixed(5)}`;
  });
}

function cancelPick() {
  pickMode = false;
  if (pickMarker) { pickMarker.setMap(null); pickMarker = null; }
  pickedLocation = null;
  document.getElementById('pick-tip').style.display = 'none';
  document.getElementById('pick-confirm').style.display = 'none';
  map.setDefaultCursor('');
  map.off('click', onMapPick);
  // 重置悬浮按钮
  const btn = document.getElementById('add-camera-btn');
  btn.classList.remove('picking');
  btn.textContent = '＋';
}

function confirmPick() {
  if (!pickedLocation) return;
  currentCamera = { ...pickedLocation, id: null };
  document.getElementById('pick-confirm').style.display = 'none';
  document.getElementById('pick-tip').style.display = 'none';
  pickMode = false;
  map.setDefaultCursor('');
  map.off('click', onMapPick);
  // 重置悬浮按钮
  const btn = document.getElementById('add-camera-btn');
  btn.classList.remove('picking');
  btn.textContent = '＋';
  openReportModal();
  document.getElementById('report-modal-addr').textContent = `位置：${pickedLocation.address}`;
}

// ─── 上报弹窗位置模式切换 ────────────────────────────────────────────────────
function switchLocMode(mode) {
  document.getElementById('loc-map-btn').classList.toggle('active', mode === 'map');
  document.getElementById('loc-search-btn').classList.toggle('active', mode === 'search');
  document.getElementById('loc-map-hint').style.display    = mode === 'map'    ? 'block' : 'none';
  document.getElementById('loc-search-wrap').style.display = mode === 'search' ? 'block' : 'none';
  if (mode === 'map') {
    closeReportModal();
    enterPickMode();
  }
}

async function searchReportLocation() {
  const q = document.getElementById('loc-search-input').value.trim();
  if (!q) return;
  const url = `https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(q)}&city=北京&key=${AMAP_REST_KEY}&output=json`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const results = document.getElementById('loc-search-results');
    if (!data.geocodes?.length) { results.innerHTML = '<div style="font-size:11px;color:var(--accent-red)">未找到结果</div>'; return; }
    results.innerHTML = data.geocodes.slice(0, 4).map(g => {
      const [lng, lat] = g.location.split(',').map(Number);
      return `<div class="search-result-item" onclick="selectSearchResult(${lng},${lat},'${g.formatted_address}')">
        📍 ${g.formatted_address}
      </div>`;
    }).join('');
  } catch(e) { showToast('error', '搜索失败', e.message); }
}

function selectSearchResult(lng, lat, address) {
  pickedLocation = { lng, lat, address };
  currentCamera = { lng, lat, address, id: null };
  document.getElementById('report-modal-addr').textContent = `位置：${address}`;
  document.getElementById('loc-search-results').innerHTML = `<div style="font-size:11px;color:var(--accent-green);padding:4px 0">✅ 已选择：${address}</div>`;
  map.setCenter([lng, lat]);
  if (pickMarker) pickMarker.setMap(null);
  pickMarker = new AMap.Marker({
    position: [lng, lat],
    content: `<div style="width:20px;height:20px;border-radius:50%;background:#00ff88;border:3px solid #fff;box-shadow:0 0 10px #00ff88;transform:translate(-50%,-50%)"></div>`,
    offset: new AMap.Pixel(0, 0), zIndex: 999,
  });
  pickMarker.setMap(map);
}

// ─── 上报弹窗 ─────────────────────────────────────────────────────────────────
let reportFile = null;

function openReportModal() {
  if (!currentCamera) return;
  document.getElementById('report-modal').classList.add('show');
}

function closeReportModal() {
  document.getElementById('report-modal').classList.remove('show');
  document.getElementById('screenshot-input').value = '';
  document.getElementById('upload-preview').style.display = 'none';
  document.getElementById('upload-placeholder').style.display = 'block';
  document.getElementById('report-desc').value = '';
  document.getElementById('report-province').value = '';
  reportFile = null;
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  reportFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('upload-preview');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function submitReport() {
  if (!currentCamera) return;
  if (!reportFile) { showToast('error', '请上传截图', '违章截图为必填项'); return; }

  const submitBtn = document.querySelector('.report-submit');
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中…';

  try {
    if (BACKEND_URL === 'https://YOUR_APP.railway.app') {
      throw new Error('请先配置后端地址 BACKEND_URL');
    }

    // 用 FormData 直接发给 Go 后端
    const form = new FormData();
    form.append('screenshot', reportFile);
    form.append('lng',           String(currentCamera.lng));
    form.append('lat',           String(currentCamera.lat));
    form.append('address',       currentCamera.address || '');
    form.append('camera_id',     String(currentCamera.id || ''));
    form.append('description',   document.getElementById('report-desc').value.trim());
    form.append('plate_province',document.getElementById('report-province').value.trim());

    const res = await fetch(`${BACKEND_URL}/api/report`, { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || '提交失败');
    }

    closeReportModal();
    closeDetail();
    showToast('safe', '✅ 上报成功', '感谢你的贡献！审核通过后将显示在地图上');

  } catch(e) {
    showToast('error', '提交失败', e.message);
  }

  submitBtn.disabled = false;
  submitBtn.textContent = '提交上报';
}

function openImgModal(url) {
  const modal = document.getElementById('img-modal');
  document.getElementById('img-modal-img').src = url;
  modal.style.display = 'flex';
}
function exportToAmap() {
  if (!lastOrigin || !lastDest) return;

  // 如果有风险路段，先弹提示
  if (lastRiskRoadNames.length > 0) {
    const roadList = lastRiskRoadNames.map(r => `• ${r}`).join('\n');
    const confirmed = confirm(
      `⚠️ 注意：高德导航路线与避让路线可能不同\n\n` +
      `以下路段在原路线中存在摄像头风险，\n` +
      `请在高德导航时手动避开：\n\n` +
      `${roadList}\n\n` +
      `点击「确定」继续打开高德导航`
    );
    if (!confirmed) return;
  }

  const [oLng, oLat] = lastOrigin.lnglat;
  const [dLng, dLat] = lastDest.lnglat;
  const oName = encodeURIComponent(lastOrigin.name);
  const dName = encodeURIComponent(lastDest.name);

  const appUrl = `amapuri://route/plan?sourceApplication=camera_intel`
    + `&slat=${oLat}&slng=${oLng}&sname=${oName}`
    + `&dlat=${dLat}&dlng=${dLng}&dname=${dName}&dev=0&t=0`;

  const webUrl = `https://uri.amap.com/navigation?from=${oLng},${oLat},${oName}&to=${dLng},${dLat},${dName}&mode=car&policy=0&src=camera_intel&coordinate=gaode&callnative=1`;

  const start = Date.now();
  window.location.href = appUrl;
  setTimeout(() => {
    if (Date.now() - start < 2000) window.open(webUrl, '_blank');
  }, 1500);
}

function clearRoutes() {
  routePolylines.forEach(p => p.setMap(null));
  riskCircles.forEach(c => c.setMap(null));
  routePolylines = [];
  riskCircles = [];
}

// ─── Distance helpers ─────────────────────────────────────────────────────────
function haversine([lng1, lat1], [lng2, lat2]) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLng = (lng2 - lng1) * rad;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function isNearPath(path, point, thresholdMeters) {
  for (let i = 0; i < path.length; i += 3) {
    if (haversine(path[i], point) < thresholdMeters) return true;
  }
  return false;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(type, title, body) {
  const el = document.getElementById('toast');
  el.className = `toast-${type}`;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 5000);
}

// ─── Loading ─────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.querySelector('.loading-text').textContent = msg || '加载中…';
  document.getElementById('loading').classList.remove('hidden');
}
function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}
